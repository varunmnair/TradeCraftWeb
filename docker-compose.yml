version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: sh -c "python -m alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    environment:
      - APP_MODE=prod
      - DATABASE_URL=sqlite:////app/data/tradecraftx.db
    volumes:
      - app_data:/app/data
    ports:
      - "8000:8000"

volumes:
  app_data:
